name: DAST (OWASP ZAP)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read

jobs:
  baseline-scan:
    name: ZAP Baseline
    if: ${{ vars.DAST_TARGET_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ vars.DAST_TARGET_URL }}
          fail_action: true
          cmd_options: '-a'

